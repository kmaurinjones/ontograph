<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Node gradient: blue (top-left) to magenta (bottom-right) -->
    <linearGradient id="grad-tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3EB2EF"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="grad-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#688DDD"/>
    </linearGradient>
    <linearGradient id="grad-bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#486BF2"/>
      <stop offset="100%" stop-color="#9375E6"/>
    </linearGradient>
    <linearGradient id="grad-center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9375E6"/>
      <stop offset="100%" stop-color="#B06DE0"/>
    </linearGradient>
    <linearGradient id="grad-tr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7DDC"/>
      <stop offset="100%" stop-color="#9375E6"/>
    </linearGradient>
    <linearGradient id="grad-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D165DA"/>
      <stop offset="100%" stop-color="#C050D8"/>
    </linearGradient>
    <linearGradient id="grad-br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BE3DE9"/>
      <stop offset="100%" stop-color="#D050E0"/>
    </linearGradient>
    <!-- Edge gradient -->
    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5588CC"/>
      <stop offset="100%" stop-color="#9966CC"/>
    </linearGradient>
  </defs>

  <!-- Edges (drawn first, behind nodes) -->
  <g stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7">
    <!-- Top-left to center -->
    <line x1="175" y1="145" x2="265" y2="265" stroke="#6080CC"/>
    <!-- Top-left to left -->
    <line x1="175" y1="145" x2="130" y2="265" stroke="#5888CC"/>
    <!-- Top-left to top-right -->
    <line x1="175" y1="145" x2="310" y2="170" stroke="#7080CC"/>
    <!-- Left to center -->
    <line x1="130" y1="265" x2="265" y2="265" stroke="#6878CC"/>
    <!-- Left to bottom-left -->
    <line x1="130" y1="265" x2="195" y2="360" stroke="#5870D0"/>
    <!-- Center to top-right -->
    <line x1="265" y1="265" x2="310" y2="170" stroke="#8070CC"/>
    <!-- Center to right -->
    <line x1="265" y1="265" x2="345" y2="285" stroke="#9068CC"/>
    <!-- Center to bottom-left -->
    <line x1="265" y1="265" x2="195" y2="360" stroke="#7868CC"/>
    <!-- Top-right to right -->
    <line x1="310" y1="170" x2="345" y2="285" stroke="#9570CC"/>
    <!-- Right to bottom-right -->
    <line x1="345" y1="285" x2="340" y2="380" stroke="#B050D0"/>
    <!-- Bottom-left to bottom-right -->
    <line x1="195" y1="360" x2="340" y2="380" stroke="#A050D8"/>
  </g>

  <!-- Nodes -->
  <!-- Top-left node (cyan-blue) -->
  <circle cx="175" cy="145" r="30" fill="url(#grad-tl)"/>
  <!-- Left node (blue) -->
  <circle cx="130" cy="265" r="24" fill="url(#grad-l)"/>
  <!-- Bottom-left node (blue-purple) -->
  <circle cx="195" cy="360" r="28" fill="url(#grad-bl)"/>
  <!-- Center node (purple, largest) -->
  <circle cx="265" cy="265" r="32" fill="url(#grad-center)"/>
  <!-- Top-right node (purple-blue) -->
  <circle cx="310" cy="170" r="22" fill="url(#grad-tr)"/>
  <!-- Right node (pink-purple) -->
  <circle cx="345" cy="285" r="20" fill="url(#grad-r)"/>
  <!-- Bottom-right node (magenta) -->
  <circle cx="340" cy="380" r="30" fill="url(#grad-br)"/>
</svg>
